{% extends "base.html" %}

{% block content %}

<h2>Validar equipamento patrimonial</h2>

<form method="post" class="form-card">

    <p>
        <strong>Código interno:</strong>
        {{ equipment.codigo_interno }}
    </p>

    <p>
        <strong>Status atual:</strong>
        {{ equipment.status }}
    </p>

    <label for="nome">Nome *</label>
    <input
        type="text"
        id="nome"
        name="nome"
        value="{{ equipment.nome }}"
        required
    >

    <label for="patrimonio">Patrimônio</label>
    <input
        type="text"
        id="patrimonio"
        name="patrimonio"
        value="{{ equipment.patrimonio or '' }}"
    >

    <label for="serial">Serial</label>
    <input
        type="text"
        id="serial"
        name="serial"
        value="{{ equipment.serial or '' }}"
    >

    <label for="categoria">Categoria</label>
    <input
        type="text"
        id="categoria"
        name="categoria"
        value="{{ equipment.categoria or '' }}"
    >

    <label for="observacoes">Observações</label>
    <textarea
        id="observacoes"
        name="observacoes"
        rows="4"
    >{{ equipment.observacoes or '' }}</textarea>

    <label for="validated_by">Validado por</label>
    <input
        type="text"
        id="validated_by"
        name="validated_by"
        placeholder="Seu nome ou matrícula"
    >

    <button type="submit">Marcar como validado</button>

</form>

{% endblock %}
