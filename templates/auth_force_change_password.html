{% extends "base.html" %}

{% block content %}

<h2>Crie uma nova senha</h2>

<div class="message warning">
    Você está usando uma senha temporária. Para continuar, crie uma nova senha.
</div>

<form method="post" class="form-card">

    <label for="new_password">Nova senha</label>
    <input
        type="password"
        id="new_password"
        name="new_password"
        required
        minlength="6"
        autofocus
    >

    <label for="confirm_password">Confirmar nova senha</label>
    <input
        type="password"
        id="confirm_password"
        name="confirm_password"
        required
        minlength="6"
    >

    <button type="submit">
        Salvar nova senha
    </button>

</form>

{% endblock %}
