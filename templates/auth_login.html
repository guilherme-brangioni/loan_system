{% extends "base.html" %}

{% block content %}

<h2>Login</h2>

<form method="post" class="form-card">

    <label for="email">E-mail</label>
    <input
        type="email"
        id="email"
        name="email"
        required
        autocomplete="email"
    >

    <label for="password">Senha</label>
    <input
        type="password"
        id="password"
        name="password"
        required
        autocomplete="current-password"
    >

    <div class="form-button-row">
        <button type="submit">
            Entrar
        </button>
    </div>

    <div class="login-links">
        <p class="login-help">
            <a href="{{ url_for('auth_bp.forgot_password') }}">
                Esqueci minha senha
            </a>
        </p>

        <p class="login-help">
            <a href="{{ url_for('auth_bp.self_register') }}">
                Criar cadastro de consulta
            </a>
        </p>
    </div>

</form>

{% endblock %}
