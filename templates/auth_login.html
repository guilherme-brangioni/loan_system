{% extends "base.html" %}

{% block content %}

<h2>Login</h2>

<form method="post" class="form-card">

    <label for="email">E-mail</label>
    <input
        type="email"
        id="email"
        name="email"
        required
        autocomplete="email"
    >

    <label for="password">Senha</label>
    <input
        type="password"
        id="password"
        name="password"
        required
        autocomplete="current-password"
    >

    <button type="submit">
        Entrar
    </button>

    <p class="login-help">
        <a href="{{ url_for('auth_bp.forgot_password') }}">
            Esqueci minha senha
        </a>
    </p>

</form>

{% endblock %}
