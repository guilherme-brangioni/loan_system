{% extends "base.html" %}

{% block content %}

{% if user %}
    <h2>Editar usuário</h2>
{% else %}
    <h2>Novo usuário</h2>
{% endif %}

<form method="post" class="form-card">

    <label for="nome">Nome</label>
    <input
        type="text"
        id="nome"
        name="nome"
        value="{{ user.nome if user else '' }}"
        required
    >

    <label for="email">E-mail</label>
    <input
        type="email"
        id="email"
        name="email"
        value="{{ user.email if user else '' }}"
        required
    >

    <label for="role">Perfil</label>
    <select id="role" name="role" required>
        {% for role in roles %}
            <option
                value="{{ role }}"
                {% if user and user.role == role %}selected{% endif %}
            >
                {{ role }}
            </option>
        {% endfor %}
    </select>

    <label>
        <input
            type="checkbox"
            name="active"
            {% if not user or user.active %}checked{% endif %}
        >
        Usuário ativo
    </label>

    <label for="password">
        Senha
        {% if user %}
            <small>preencha somente se quiser alterar</small>
        {% endif %}
    </label>
    <input
        type="password"
        id="password"
        name="password"
        {% if not user %}required{% endif %}
    >

    <button type="submit">Salvar</button>

</form>

{% endblock %}
