{% extends "base.html" %}

{% block content %}

<h2>Criar primeiro administrador</h2>

<p class="hint">
    Nenhum usuário foi encontrado. Crie o primeiro administrador do sistema.
</p>

<form method="post" class="form-card">

    <label for="nome">Nome</label>
    <input
        type="text"
        id="nome"
        name="nome"
        required
    >

    <label for="email">E-mail</label>
    <input
        type="email"
        id="email"
        name="email"
        required
    >

    <label for="password">Senha</label>
    <input
        type="password"
        id="password"
        name="password"
        required
    >

    <button type="submit">Criar administrador</button>

</form>

{% endblock %}
