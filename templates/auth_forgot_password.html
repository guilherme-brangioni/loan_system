{% extends "base.html" %}

{% block content %}

<h2>Esqueci minha senha</h2>

<p class="hint">
    Informe seu e-mail cadastrado. Se o usuário estiver ativo, uma senha temporária será enviada.
</p>

<form method="post" class="form-card">

    <label for="email">E-mail</label>

    <input
        type="email"
        id="email"
        name="email"
        required
        autofocus
    >

    <div class="form-button-row">
        <button type="submit">
            Enviar senha temporária
        </button>
    </div>
    
    <a class="button secondary" href="{{ url_for('auth_bp.login') }}">
        Voltar ao login
    </a>

</form>

{% endblock %}
